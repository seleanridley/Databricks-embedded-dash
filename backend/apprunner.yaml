version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip3 install -r requirements.txt
      - pip3 install gunicorn

run:
  runtime-version: 3.11
  pre-run:
    - pip3 install -r requirements.txt
  command: gunicorn -b 0.0.0.0:8080 app:app
  network:
    port: 8080

  runtime-environment-secrets:
    DATABRICKS_DASHBOARD_ID: arn:aws:secretsmanager:us-east-1:346818912604:secret:GOI_Dashboard-Us10co:DATABRICKS_DASHBOARD_ID
    DATABRICKS_CLIENT_SECRET: arn:aws:secretsmanager:us-east-1:346818912604:secret:GOI_Dashboard-Us10co:DATABRICKS_CLIENT_SECRET
    DATABRICKS_CLIENT_ID: arn:aws:secretsmanager:us-east-1:346818912604:secret:GOI_Dashboard-Us10co:DATABRICKS_CLIENT_ID
    DATABRICKS_CLIENT_SECRET: arn:aws:secretsmanager:us-east-1:346818912604:secret:GOI_Dashboard-Us10co:DATABRICKS_CLIENT_SECRET
    DATABRICKS_WORKSPACE_URL: arn:aws:secretsmanager:us-east-1:346818912604:secret:GOI_Dashboard-Us10co:DATABRICKS_WORKSPACE_URL
